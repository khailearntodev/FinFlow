#      context: ./finflow-frontend
#      dockerfile: Dockerfile
#    container_name: finflow_frontend
#    ports:
#      - "3000:3000"
#    environment:
#      - NEXT_PUBLIC_API_URL=http://localhost:8080 # Trỏ API gọi về Backend
#    depends_on:
#      - backend

volumes:
  pgdata: