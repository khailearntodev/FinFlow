services:
  postgres:
    image: postgres:16
    container_name: finflow_postgres
    environment:
      - POSTGRES_DB=finflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=khai
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Backend Service (Spring Boot)
  backend:
    build:
      context: ./finflow-backend
      dockerfile: Dockerfile
    container_name: finflow_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/finflow
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=khai
      - JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres

  # 3. Frontend Service (Next.js)
